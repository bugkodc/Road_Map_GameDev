name: Refresh prefetched docs

# Re-fetches the latest STABLE Unity + Game Programming Patterns pages once a month and commits
# any changes (which triggers the Deploy workflow). To pull a newer Unity version, bump
# UNITY_DOC_VERSION in src/config/docVersions.js first.
#
# Unreal docs are NOT refreshed here: scripts/updateUnrealDocs.js calls a translation API and is
# slow/rate-limited in CI. Refresh those manually with `npm run update:unreal` after bumping the
# version, or run this workflow manually with "include_unreal" set to true.

on:
  schedule:
    - cron: '0 3 1 * *' # 03:00 UTC, 1st of every month
  workflow_dispatch:
    inputs:
      include_unreal:
        description: 'Also refresh Unreal docs (slow, uses translation API)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Refresh Unity + GPP docs
        run: |
          npm run update:unity
          npm run update:gpp

      - name: Refresh Unreal docs (manual runs only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_unreal }}
        run: npm run update:unreal

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/unity-docs public/gpp-docs public/unreal-docs
          if git diff --staged --quiet; then
            echo "No documentation changes."
          else
            git commit -m "chore: refresh prefetched docs"
            git push
          fi
